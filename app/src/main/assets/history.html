<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fintech Pro - History</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-[#0f0f0f] text-white font-['Inter'] min-h-screen pb-24">

    <!-- Header -->
    <header class="p-6 flex items-center justify-between sticky top-0 bg-[#0f0f0f]/80 backdrop-blur-xl z-10">
        <div class="flex items-center gap-4">
            <a href="dashboard.html" class="w-10 h-10 bg-[#1a1a1a] rounded-xl flex items-center justify-center border border-white/5 active:scale-95 transition-transform">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-chevron-left"><path d="m15 18-6-6 6-6"/></svg>
            </a>
            <h2 class="text-xl font-bold">History</h2>
        </div>
        <button id="clear-all" class="text-gray-500 text-xs font-bold uppercase tracking-widest">Clear All</button>
    </header>

    <!-- Filters -->
    <section class="px-6 mb-6 flex gap-2 overflow-x-auto no-scrollbar py-2">
        <button class="filter-btn active bg-[#ff1f3d] text-white px-6 py-2 rounded-full text-sm font-semibold whitespace-nowrap" data-filter="all">All</button>
        <button class="filter-btn bg-[#1a1a1a] text-gray-400 px-6 py-2 rounded-full text-sm font-semibold whitespace-nowrap border border-white/5" data-filter="income">Income</button>
        <button class="filter-btn bg-[#1a1a1a] text-gray-400 px-6 py-2 rounded-full text-sm font-semibold whitespace-nowrap border border-white/5" data-filter="expense">Expenses</button>
    </section>

    <!-- Transaction List -->
    <main class="px-6 space-y-4" id="transaction-list">
        <!-- Transactions will be injected here -->
    </main>

    <!-- Bottom Navigation -->
    <nav class="fixed bottom-0 left-0 right-0 bg-[#0f0f0f]/80 backdrop-blur-xl border-t border-white/5 px-8 py-4 flex justify-between items-center z-50">
        <a href="dashboard.html" class="text-gray-500">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-layout-dashboard"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>
        </a>
        <a href="history.html" class="text-[#ff1f3d]">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-history"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>
        </a>
        <a href="add-expense.html" class="w-14 h-14 bg-[#ff1f3d] rounded-full flex items-center justify-center -mt-10 shadow-lg shadow-[#ff1f3d]/40">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-plus"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
        </a>
        <a href="#" class="text-gray-500">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-pie-chart"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></svg>
        </a>
        <a href="#" class="text-gray-500">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-settings"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.1a2 2 0 0 1-1-1.72v-.51a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
        </a>
    </nav>

    <script src="js/storage.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            UI.renderHistory('all');

            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.filter-btn').forEach(b => {
                        b.classList.remove('active', 'bg-[#ff1f3d]', 'text-white');
                        b.classList.add('bg-[#1a1a1a]', 'text-gray-400');
                    });
                    btn.classList.add('active', 'bg-[#ff1f3d]', 'text-white');
                    btn.classList.remove('bg-[#1a1a1a]', 'text-gray-400');
                    UI.renderHistory(btn.dataset.filter);
                });
            });

            document.getElementById('clear-all').addEventListener('click', () => {
                if (confirm('Are you sure you want to clear all transactions?')) {
                    Storage.clearAll();
                    UI.renderHistory('all');
                }
            });
        });
    </script>
</body>
</html>
