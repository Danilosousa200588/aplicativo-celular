<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fintech Pro - Add Income</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-[#0f0f0f] text-white font-['Inter'] min-h-screen">

    <!-- Header -->
    <header class="p-6 flex items-center gap-4">
        <a href="dashboard.html" class="w-10 h-10 bg-[#1a1a1a] rounded-xl flex items-center justify-center border border-white/5 active:scale-95 transition-transform">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-chevron-left"><path d="m15 18-6-6 6-6"/></svg>
        </a>
        <h2 class="text-xl font-bold">Add Income</h2>
    </header>

    <!-- Form -->
    <main class="px-6 py-4">
        <form id="income-form" class="space-y-6">
            <div class="bg-[#1a1a1a] p-8 rounded-[2rem] border border-white/5 text-center mb-8">
                <p class="text-gray-400 text-sm mb-2">Amount</p>
                <div class="flex items-center justify-center gap-2">
                    <span class="text-3xl font-bold text-gray-500">$</span>
                    <input type="number" id="amount" step="0.01" placeholder="0.00" class="bg-transparent text-5xl font-bold w-full text-center outline-none focus:text-green-500 transition-colors" required>
                </div>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="text-xs text-gray-500 uppercase tracking-widest font-bold mb-2 block">Source</label>
                    <select id="category" class="w-full bg-[#1a1a1a] border border-white/5 p-4 rounded-2xl outline-none focus:border-green-500 transition-colors" required>
                        <option value="Salary">Salary</option>
                        <option value="Freelance">Freelance</option>
                        <option value="Investment">Investment</option>
                        <option value="Gift">Gift</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <div>
                    <label class="text-xs text-gray-500 uppercase tracking-widest font-bold mb-2 block">Description</label>
                    <input type="text" id="description" placeholder="Where did this come from?" class="w-full bg-[#1a1a1a] border border-white/5 p-4 rounded-2xl outline-none focus:border-green-500 transition-colors" required>
                </div>

                <div>
                    <label class="text-xs text-gray-500 uppercase tracking-widest font-bold mb-2 block">Date</label>
                    <input type="date" id="date" class="w-full bg-[#1a1a1a] border border-white/5 p-4 rounded-2xl outline-none focus:border-green-500 transition-colors" required>
                </div>
            </div>

            <button type="submit" class="w-full bg-green-600 text-white font-bold py-5 rounded-2xl shadow-lg shadow-green-600/30 active:scale-95 transition-transform mt-8">
                Save Income
            </button>
        </form>
    </main>

    <script src="js/storage.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Set default date to today
            document.getElementById('date').valueAsDate = new Date();

            document.getElementById('income-form').addEventListener('submit', (e) => {
                e.preventDefault();
                const amount = parseFloat(document.getElementById('amount').value);
                const category = document.getElementById('category').value;
                const description = document.getElementById('description').value;
                const date = document.getElementById('date').value;

                Storage.addTransaction({
                    type: 'income',
                    amount: amount,
                    category: category,
                    description: description,
                    date: date,
                    id: Date.now()
                });

                window.location.href = 'dashboard.html';
            });
        });
    </script>
</body>
</html>
