<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fintech Pro - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-[#0f0f0f] text-white font-['Inter'] min-h-screen pb-24">

    <!-- Header -->
    <header class="p-6 flex items-center justify-between">
        <div>
            <p class="text-gray-400 text-xs uppercase tracking-widest font-semibold">Welcome back,</p>
            <h2 id="user-name" class="text-2xl font-bold">John Doe</h2>
        </div>
        <div id="user-avatar" class="w-12 h-12 rounded-full border-2 border-[#ff1f3d] overflow-hidden">
            <img src="https://picsum.photos/seed/user/100/100" alt="Profile" class="w-full h-full object-cover">
        </div>
    </header>

    <!-- Balance Card -->
    <section class="px-6 mb-8">
        <div class="bg-gradient-to-br from-[#ff1f3d] to-[#b31228] p-8 rounded-[2rem] shadow-[0_20px_40px_rgba(255,31,61,0.2)] relative overflow-hidden">
            <div class="absolute top-0 right-0 w-32 h-32 bg-white/10 rounded-full -mr-10 -mt-10 blur-2xl"></div>
            <p class="text-white/70 text-sm mb-2">Total Balance</p>
            <h1 id="total-balance" class="text-4xl font-bold tracking-tight mb-6">$0.00</h1>
            <div class="flex gap-8">
                <div>
                    <p class="text-white/60 text-[10px] uppercase tracking-wider mb-1">Income</p>
                    <p id="total-income" class="text-lg font-semibold">+$0.00</p>
                </div>
                <div>
                    <p class="text-white/60 text-[10px] uppercase tracking-wider mb-1">Expenses</p>
                    <p id="total-expenses" class="text-lg font-semibold">-$0.00</p>
                </div>
            </div>
        </div>
    </section>

    <!-- Quick Actions -->
    <section class="px-6 mb-8 grid grid-cols-2 gap-4">
        <a href="add-income.html" class="bg-[#1a1a1a] p-4 rounded-2xl flex items-center gap-3 border border-white/5 active:scale-95 transition-transform">
            <div class="w-10 h-10 bg-green-500/20 text-green-500 rounded-xl flex items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-plus"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
            </div>
            <span class="font-semibold text-sm">Income</span>
        </a>
        <a href="add-expense.html" class="bg-[#1a1a1a] p-4 rounded-2xl flex items-center gap-3 border border-white/5 active:scale-95 transition-transform">
            <div class="w-10 h-10 bg-red-500/20 text-red-500 rounded-xl flex items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-minus"><path d="M5 12h14"/></svg>
            </div>
            <span class="font-semibold text-sm">Expense</span>
        </a>
    </section>

    <!-- Charts -->
    <section class="px-6 mb-8">
        <div class="bg-[#1a1a1a] p-6 rounded-[2rem] border border-white/5 mb-6">
            <h3 class="text-lg font-bold mb-4">Balance Evolution</h3>
            <canvas id="balanceChart" height="200"></canvas>
        </div>
        
        <div class="grid grid-cols-1 gap-6">
            <div class="bg-[#1a1a1a] p-6 rounded-[2rem] border border-white/5">
                <h3 class="text-lg font-bold mb-4">Income vs Expenses</h3>
                <canvas id="summaryChart" height="150"></canvas>
            </div>
            <div class="bg-[#1a1a1a] p-6 rounded-[2rem] border border-white/5">
                <h3 class="text-lg font-bold mb-4">Expenses by Category</h3>
                <canvas id="categoryChart" height="250"></canvas>
            </div>
        </div>
    </section>

    <!-- Recent Transactions -->
    <section class="px-6">
        <div class="flex items-center justify-between mb-4">
            <h3 class="text-lg font-bold">Recent Transactions</h3>
            <a href="history.html" class="text-[#ff1f3d] text-sm font-semibold">See All</a>
        </div>
        <div id="recent-transactions" class="space-y-4">
            <!-- Transactions will be injected here -->
        </div>
    </section>

    <!-- Bottom Navigation -->
    <nav class="fixed bottom-0 left-0 right-0 bg-[#0f0f0f]/80 backdrop-blur-xl border-t border-white/5 px-8 py-4 flex justify-between items-center z-50">
        <a href="dashboard.html" class="text-[#ff1f3d]">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-layout-dashboard"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>
        </a>
        <a href="history.html" class="text-gray-500">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-history"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>
        </a>
        <a href="add-expense.html" class="w-14 h-14 bg-[#ff1f3d] rounded-full flex items-center justify-center -mt-10 shadow-lg shadow-[#ff1f3d]/40">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-plus"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
        </a>
        <a href="#" class="text-gray-500">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-pie-chart"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></svg>
        </a>
        <button id="logout-btn" class="text-gray-500">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-log-out"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>
        </button>
    </nav>

    <script src="js/storage.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/charts.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (!Auth.isAuthenticated()) {
                window.location.href = 'index.html';
                return;
            }
            
            const user = Auth.getUser();
            document.getElementById('user-name').textContent = user.name;
            
            UI.updateDashboard();
            Charts.initDashboardCharts();
            
            document.getElementById('logout-btn').addEventListener('click', () => {
                Auth.logout();
                window.location.href = 'index.html';
            });
        });
    </script>
</body>
</html>
